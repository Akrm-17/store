<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarShow X - Luxury Car Exhibition</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background-color: #121212;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            min-height: 100vh;
            position: relative;
        }
        
        /* Navbar Styles */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .logo span {
            color: #ffffff;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
        }
        
        .nav-links li {
            margin-left: 30px;
        }
        
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: #f1c40f;
        }
        
        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.3));
            z-index: -1;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            animation: zoomEffect 20s infinite alternate;
        }
        
        @keyframes zoomEffect {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }
        
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.5s;
        }
        
        .hero p {
            font-size: 1.5rem;
            max-width: 800px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.5s forwards 1s;
        }
        
        .cta-button {
            padding: 15px 40px;
            background-color: #f1c40f;
            color: #121212;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            animation: fadeIn 1.5s forwards 1.5s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .cta-button:hover {
            background-color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.3);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Footer */
        footer {
            background-color: #000000;
            padding: 30px 5%;
            text-align: center;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .social-icons a {
            color: #ffffff;
            margin: 0 15px;
            font-size: 1.5rem;
            transition: color 0.3s;
        }
        
        .social-icons a:hover {
            color: #f1c40f;
        }
        
        .copyright {
            font-size: 0.9rem;
            color: #777777;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero p {
                font-size: 1.2rem;
            }
            
            .nav-links {
                display: none;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">CarShow <span>X</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="featured.html">feather</a></li>
                <li><a href="specs.html">Specs & Prices</a></li>  
                <li><a href="services.html">Services</a></li>     
                <li><a href="reviews.html">Customer Reviews</a></li> 
                <li><a href="contact.html">Contact</a></li>

              </ul>
        </nav>
        
        <section class="hero">
            <video autoplay muted loop class="hero-bg">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-sports-car-driving-fast-on-a-race-track-42845-large.mp4" type="video/mp4">
            </video>
            <h1>Welcome to CarShow <span style="color: #f1c40f;">X</span></h1>
            <p>Where power meets elegance in the world of premium automobiles</p>
            <button class="cta-button" onclick="window.location.href='categories.html'">Start Tour</button>
        </section>
        
        <footer>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <p class="copyright">© 2025 CarShow X. All Rights Reserved.</p>
        </footer>
    </div>
    
    <script>
        // Background music (optional)
        document.addEventListener('DOMContentLoaded', function() {
            // Uncomment to enable background music
            // const bgMusic = new Audio('background-music.mp3');
            // bgMusic.loop = true;
            // bgMusic.volume = 0.3;
            
            // Play music when user interacts with page
            // document.body.addEventListener('click', function() {
            //     bgMusic.play();
            // }, { once: true });
            
            // Navbar scroll effect
            window.addEventListener('scroll', function() {
                const nav = document.querySelector('nav');
                if (window.scrollY > 50) {
                    nav.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
                } else {
                    nav.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
                }
            });
            
            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>
</html>
